spring.application.name=gateway-service
server.port=8080

# USUARIO-SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=usuario-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/usuarios/**

# AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/auth/**

# SUBASTA-SERVICE
spring.cloud.gateway.server.webflux.routes[2].id=subasta-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8087
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/subastas/**

# OFERTA-SERVICE
spring.cloud.gateway.server.webflux.routes[3].id=oferta-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8088
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/ofertas/**

# NOTIFICACION-SERVICE
spring.cloud.gateway.server.webflux.routes[4].id=notificacion-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8090
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/notificaciones/**